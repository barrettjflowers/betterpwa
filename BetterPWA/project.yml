name: BetterPWA
options:
  bundleIdPrefix: com.betterpwa
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  BetterPWA:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: Models
      - path: Services
      - path: Resources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.betterpwa.app
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: BetterPWA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES

schemes:
  BetterPWA:
    build:
      targets:
        BetterPWA: all
    run:
      config: Debug
